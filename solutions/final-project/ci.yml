# Final-project CI — build, test, scan, push.
# Place at: .github/workflows/ci.yml
# Repo secrets required: DOCKERHUB_USERNAME, DOCKERHUB_TOKEN  (a Docker Hub access token)
name: ci

on:
  push:
    branches: [main]

jobs:
  build-test-scan-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build the image
        run: docker build -t myapp:${{ github.sha }} .

      # Test the ACTUAL artifact, not just the source
      - name: Test inside the image
        run: docker run --rm myapp:${{ github.sha }} npm test

      # Scan with Trivy and FAIL the build on HIGH/CRITICAL (no Docker Scout needed)
      - name: Scan with Trivy
        uses: aquasecurity/trivy-action@0.36.0
        with:
          image-ref: myapp:${{ github.sha }}
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: '1'

      - name: Log in to Docker Hub
        run: echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

      - name: Tag and push
        run: |
          docker tag myapp:${{ github.sha }} levep79/myapp:${{ github.sha }}
          docker tag myapp:${{ github.sha }} levep79/myapp:latest
          docker push levep79/myapp:${{ github.sha }}
          docker push levep79/myapp:latest

