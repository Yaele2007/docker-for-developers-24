# Lab 22 — FIXED. The only change: DB_HOST now matches the db service name.
services:
  app:
    image: postgres:16
    command: >
      sh -c "until pg_isready -h $$DB_HOST -U app; do
               echo \"waiting for $$DB_HOST ...\"; sleep 2;
             done; echo CONNECTED; sleep 3600"
    environment:
      DB_HOST: db                 # was 'databse' — must match the service name below
      PGPASSWORD: secret
    depends_on:
      - db

  db:
    image: postgres:16
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: app
